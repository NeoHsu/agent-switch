name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo install cargo-audit --locked --version 0.22.2
      - run: cargo audit --deny warnings

  build:
    needs: verify
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - run: cargo build --release -p agent-switch-cli --target ${{ matrix.target }} --locked
      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: tar -czf ags-${{ matrix.asset }}.tar.gz -C target/${{ matrix.target }}/release ags
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/ags.exe -DestinationPath ags-${{ matrix.asset }}.zip
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ags-${{ matrix.asset }}.*
